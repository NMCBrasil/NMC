<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard NMC - Operadoras</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#e5e7eb; color:#1f2937; }
    header { position:sticky; top:0; z-index:10; padding:16px; text-align:center; font-size:22px; font-weight:600; background:#f9fafb; border-bottom:1px solid #d1d5db; }
    .container { padding:20px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap:20px; margin-bottom:20px; }
    .card { background:#ffffff; border:1px solid #d1d5db; border-radius:12px; padding:16px; }
    .kpi { font-size:24px; font-weight:700; }
    h3 { margin-top:0; font-size:14px; color:#6b7280; }
    input, select, button { padding:8px; margin:5px; border-radius:6px; border:1px solid #d1d5db; }
    button { background:#2563eb; color:white; cursor:pointer; border:none; }
    .delete { background:#dc2626; }
  </style>
</head>
<body>

<header>Dashboard NMC - Descontos</header>

<div class="container">

  <div class="card">
    <h3>Adicionar Registro</h3>
    <input id="mes" placeholder="Mês">
    <input id="operadora" placeholder="Operadora">
    <input id="circuito" placeholder="Circuito">
    <input id="desconto" type="number" placeholder="Desconto">
    <button onclick="addData()">Adicionar</button>

    <h3>Backup de Dados</h3>
    <button onclick="exportar()">Exportar Dados</button>
    <input type="file" onchange="importar(event)">
  </div>

</div>

<script>
let dados = JSON.parse(localStorage.getItem('dados')) || [];

function salvar(){ localStorage.setItem('dados', JSON.stringify(dados)); }

function addData(){
  const mes = mesInput.value;
  const operadora = operadoraInput.value;
  const circuito = circuitoInput.value;
  const desconto = parseFloat(descontoInput.value);

  if(!mes || !operadora || !circuito || isNaN(desconto)) return alert('Preencha tudo corretamente');

  dados.push({mes,operadora,circuito,desconto});
  salvar();

  mesInput.value=''; operadoraInput.value=''; circuitoInput.value=''; descontoInput.value='';
}

function exportar(){
  const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'backup-dados.json';
  a.click();
}

function importar(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    try{
      dados = JSON.parse(e.target.result);
      salvar();
      alert('Dados importados com sucesso!');
    }catch{
      alert('Erro ao importar arquivo');
    }
  };
  reader.readAsText(file);
}

const mesInput=document.getElementById('mes');
const operadoraInput=document.getElementById('operadora');
const circuitoInput=document.getElementById('circuito');
const descontoInput=document.getElementById('desconto');
</script>

</body>
</html>
