<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard NMC - Operadoras</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin:0; font-family: 'Segoe UI', sans-serif; background:#0f172a; color:#e2e8f0; }
    header { padding:20px; text-align:center; font-size:22px; font-weight:bold; background:#020617; border-bottom:1px solid #1e293b; }
    .container { padding:20px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:20px; margin-bottom:20px; }
    .card { background:#020617; border:1px solid #1e293b; border-radius:12px; padding:20px; }
    .kpi { font-size:24px; font-weight:bold; }
    input, button { padding:8px; margin:5px 5px 5px 0; border-radius:6px; border:none; }
    button { background:#2563eb; color:white; cursor:pointer; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding:10px; border-bottom:1px solid #1e293b; }
    th { color:#94a3b8; text-align:left; }
  </style>
</head>
<body>

<header>Dashboard NMC - Descontos</header>

<div class="container">

  <div class="card">
    <h3>Adicionar Registro</h3>
    <input id="mes" placeholder="Mês">
    <input id="operadora" placeholder="Operadora">
    <input id="circuito" placeholder="Circuito">
    <input id="desconto" type="number" placeholder="Desconto">
    <button onclick="addData()">Adicionar</button>
  </div>

  <div class="grid">
    <div class="card"><h3>Total Desconto</h3><div id="totalDesconto" class="kpi">R$ 0</div></div>
    <div class="card"><h3>Total Circuitos</h3><div id="totalCircuitos" class="kpi">0</div></div>
    <div class="card"><h3>Operadoras</h3><div id="totalOperadoras" class="kpi">0</div></div>
  </div>

  <div class="grid">
    <div class="card"><h3>Por Operadora</h3><canvas id="chartOperadora"></canvas></div>
    <div class="card"><h3>Por Mês</h3><canvas id="chartMes"></canvas></div>
    <div class="card"><h3>Top Circuitos</h3><canvas id="chartCircuito"></canvas></div>
  </div>

  <div class="card">
    <h3>Dados</h3>
    <table>
      <thead>
        <tr><th>Mês</th><th>Operadora</th><th>Circuito</th><th>Desconto</th></tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>

</div>

<script>
let dados = JSON.parse(localStorage.getItem('dados')) || [];

function salvar() {
  localStorage.setItem('dados', JSON.stringify(dados));
}

function addData() {
  const mes = mesInput.value;
  const operadora = operadoraInput.value;
  const circuito = circuitoInput.value;
  const desconto = parseFloat(descontoInput.value);

  if (!mes || !operadora || !circuito || !desconto) return alert('Preencha tudo');

  dados.push({ mes, operadora, circuito, desconto });
  salvar();
  render();
}

function agrupar(campo) {
  const mapa = {};
  dados.forEach(d => {
    mapa[d[campo]] = (mapa[d[campo]] || 0) + d.desconto;
  });
  return mapa;
}

function topCircuitos() {
  const mapa = agrupar('circuito');
  const ordenado = Object.entries(mapa).sort((a,b)=>b[1]-a[1]).slice(0,10);
  return {
    labels: ordenado.map(i=>i[0]),
    valores: ordenado.map(i=>i[1])
  };
}

function renderKPIs() {
  const total = dados.reduce((a,b)=>a+b.desconto,0);
  totalDesconto.innerText = 'R$ ' + total.toFixed(2);
  totalCircuitos.innerText = dados.length;
  totalOperadoras.innerText = [...new Set(dados.map(d=>d.operadora))].length;
}

function renderTabela() {
  tabela.innerHTML = '';
  dados.forEach(d => {
    tabela.innerHTML += `<tr><td>${d.mes}</td><td>${d.operadora}</td><td>${d.circuito}</td><td>R$ ${d.desconto}</td></tr>`;
  });
}

let chartOp, chartMes, chartCircuito;

function renderGraficoOperadora() {
  const data = agrupar('operadora');
  if (chartOp) chartOp.destroy();
  chartOp = new Chart(chartOperadora, { type: 'bar', data: { labels: Object.keys(data), datasets: [{ data: Object.values(data) }] } });
}

function renderGraficoMes() {
  const data = agrupar('mes');
  if (chartMes) chartMes.destroy();
  chartMes = new Chart(chartMesCanvas, { type: 'line', data: { labels: Object.keys(data), datasets: [{ data: Object.values(data) }] } });
}

function renderGraficoCircuito() {
  const data = topCircuitos();
  if (chartCircuito) chartCircuito.destroy();
  chartCircuito = new Chart(chartCircuitoCanvas, { type: 'bar', data: { labels: data.labels, datasets: [{ data: data.valores }] } });
}

function render() {
  renderKPIs();
  renderTabela();
  renderGraficoOperadora();
  renderGraficoMes();
  renderGraficoCircuito();
}

const mesInput = document.getElementById('mes');
const operadoraInput = document.getElementById('operadora');
const circuitoInput = document.getElementById('circuito');
const descontoInput = document.getElementById('desconto');
const tabela = document.getElementById('tabela');
const totalDesconto = document.getElementById('totalDesconto');
const totalCircuitos = document.getElementById('totalCircuitos');
const totalOperadoras = document.getElementById('totalOperadoras');
const chartOperadora = document.getElementById('chartOperadora');
const chartMesCanvas = document.getElementById('chartMes');
const chartCircuitoCanvas = document.getElementById('chartCircuito');

render();
</script>

</body>
</html>
