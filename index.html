<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Operadoras</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#e5e7eb; color:#1f2937; }
    header { position:sticky; top:0; z-index:10; padding:16px; text-align:center; font-size:22px; font-weight:600; background:#f9fafb; border-bottom:1px solid #d1d5db; }
    .container { padding:20px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap:20px; margin-bottom:20px; }
    .card { background:#ffffff; border:1px solid #d1d5db; border-radius:12px; padding:16px; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
    .kpi { font-size:24px; font-weight:700; color:#111827; }
    h3 { margin-top:0; font-size:14px; color:#6b7280; }
    .toolbar { position:sticky; top:64px; z-index:9; }
    input, select, button { padding:8px; margin:5px 5px 5px 0; border-radius:6px; border:1px solid #d1d5db; }
    button { background:#2563eb; color:white; cursor:pointer; border:none; }
    .delete { background:#dc2626; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding:10px; border-bottom:1px solid #e5e7eb; font-size:13px; }
    th { color:#6b7280; text-align:left; cursor:pointer; }
    tr.highlight td { background:#ecfdf5; }
  </style>
</head>
<body>

<header>Dashboard Operadoras</header>

<div class="container">

  <div class="card toolbar">
    <h3>Adicionar Registro</h3>
    <input id="mes" placeholder="Mês">
    <input id="operadora" placeholder="Operadora">
    <input id="circuito" placeholder="Circuito">
    <input id="desconto" type="number" placeholder="Desconto">
    <button onclick="addData()">Adicionar</button>

    <h3>Filtros</h3>
    <select id="filtroMes" onchange="render()"><option value="">Todos Meses</option></select>
    <select id="filtroOperadora" onchange="render()"><option value="">Todas Operadoras</option></select>
  </div>

  <div class="grid">
    <div class="card"><h3>Total Desconto</h3><div id="totalDesconto" class="kpi">R$ 0</div></div>
    <div class="card"><h3>Total Circuitos</h3><div id="totalCircuitos" class="kpi">0</div></div>
    <div class="card"><h3>Operadoras</h3><div id="totalOperadoras" class="kpi">0</div></div>
  </div>

  <div class="grid">
    <div class="card"><h3>Por Operadora</h3><canvas id="chartOperadora"></canvas></div>
    <div class="card"><h3>Por Mês</h3><canvas id="chartMes"></canvas></div>
    <div class="card"><h3>Por Circuito</h3><canvas id="chartCircuito"></canvas></div>
  </div>

  <div class="card">
    <h3>Dados (clique no cabeçalho para ordenar)</h3>
    <table>
      <thead>
        <tr>
          <th onclick="ordenar('mes')">Mês</th>
          <th onclick="ordenar('operadora')">Operadora</th>
          <th onclick="ordenar('circuito')">Circuito</th>
          <th onclick="ordenar('desconto')">Desconto</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>

</div>

<script>
let dados = JSON.parse(localStorage.getItem('dados')) || [];
let ordem = { campo:null, asc:true };

function salvar(){ localStorage.setItem('dados', JSON.stringify(dados)); }

function addData(){
  const mes = mesInput.value;
  const operadora = operadoraInput.value;
  const circuito = circuitoInput.value;
  const desconto = parseFloat(descontoInput.value);
  if(!mes||!operadora||!circuito||!desconto) return alert('Preencha tudo');
  dados.push({mes,operadora,circuito,desconto});
  salvar(); atualizarFiltros(); render();
}

function remover(i){ dados.splice(i,1); salvar(); render(); }

function filtrar(){
  return dados.filter(d => (!filtroMes.value||d.mes===filtroMes.value) && (!filtroOperadora.value||d.operadora===filtroOperadora.value));
}

function agrupar(lista,campo){
  const m={}; lista.forEach(d=>m[d[campo]]=(m[d[campo]]||0)+d.desconto); return m;
}

function ordenar(campo){
  ordem.asc = ordem.campo===campo ? !ordem.asc : true;
  ordem.campo = campo;
  render();
}

function renderKPIs(lista){
  const total = lista.reduce((a,b)=>a+b.desconto,0);
  totalDesconto.innerText = 'R$ '+total.toLocaleString('pt-BR',{minimumFractionDigits:2});
  totalCircuitos.innerText = lista.length;
  totalOperadoras.innerText = [...new Set(lista.map(d=>d.operadora))].length;
}

function renderTabela(lista){
  if(ordem.campo){
    lista.sort((a,b)=> ordem.asc ? (a[ordem.campo]>b[ordem.campo]?1:-1) : (a[ordem.campo]<b[ordem.campo]?1:-1));
  }
  tabela.innerHTML='';
  const max = Math.max(...lista.map(d=>d.desconto),0);
  lista.forEach((d,i)=>{
    const highlight = d.desconto===max ? 'highlight' : '';
    tabela.innerHTML += `<tr class='${highlight}'>
      <td>${d.mes}</td>
      <td>${d.operadora}</td>
      <td>${d.circuito}</td>
      <td>R$ ${d.desconto.toLocaleString('pt-BR')}</td>
      <td><button class='delete' onclick='remover(${i})'>Excluir</button></td>
    </tr>`;
  });
}

function makeChart(ctx,type,labels,data){
  return new Chart(ctx,{ type,
    data:{ labels, datasets:[{ data, backgroundColor: labels.map((_,i)=>`hsl(${i*40},70%,60%)`) }]},
    options:{ plugins:{ tooltip:{ callbacks:{ label:(c)=>'R$ '+c.raw.toLocaleString('pt-BR') } } } }
  });
}

let c1,c2,c3;
function renderCharts(lista){
  const op=agrupar(lista,'operadora');
  const mes=agrupar(lista,'mes');
  const cir=agrupar(lista,'circuito');
  if(c1) c1.destroy(); if(c2) c2.destroy(); if(c3) c3.destroy();
  c1=makeChart(chartOperadora,'bar',Object.keys(op),Object.values(op));
  c2=makeChart(chartMes,'line',Object.keys(mes),Object.values(mes));
  c3=makeChart(chartCircuito,'bar',Object.keys(cir),Object.values(cir));
}

function atualizarFiltros(){
  filtroMes.innerHTML='<option value="">Todos Meses</option>';
  filtroOperadora.innerHTML='<option value=
